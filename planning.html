<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanUp Manager – Planning</title>

  <style>
    :root {
      --violet-light: #F3ECFF;
      --violet-mid: #DCCBFF;
      --violet-main: #7A5CFF;
      --violet-dark: #6238FF;
      --text-dark: #111;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Comic Sans MS", sans-serif;
      background: linear-gradient(180deg, #F8F4FF 0%, #EDE6FF 80%);
      color: var(--text-dark);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
      box-sizing: border-box;
    }

    /* LOGO + TITRE */
    .logo-title {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #FFF;
      border: 2px solid var(--violet-main);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--violet-main);
      font-size: 20px;
      font-weight: bold;
      position: relative;
    }

    .logo-icon::after {
      content: "✦";
      position: absolute;
      top: -6px;
      right: -4px;
      font-size: 12px;
      color: var(--violet-main);
    }

    h1 {
      font-size: 24px;
      margin: 0;
      font-weight: 700;
      color: #111;
    }

    .subtitle {
      font-size: 16px;
      color: #444;
      margin-top: 4px;
      text-align: center;
    }

    .badge {
      margin-top: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      color: #555;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
    }

    /* LAYOUT PLANNING */
    .planning-layout {
      width: 100%;
      max-width: 960px;
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .planning-layout {
        flex-direction: row;
        align-items: flex-start;
      }
    }

    .calendar-card,
    .agenda-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #EEE4FF 100%);
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      padding: 16px 14px 18px;
      box-sizing: border-box;
    }

    .calendar-card {
      flex: 1.2;
    }

    .agenda-card {
      flex: 1;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* CALENDRIER */
    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .month-label {
      font-size: 15px;
      font-weight: 700;
    }

    .month-nav {
      display: flex;
      gap: 4px;
    }

    .month-btn {
      border: none;
      background: #fff;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      color: var(--violet-main);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .month-btn:active {
      transform: translateY(1px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
      text-align: center;
    }

    .weekdays div {
      padding: 4px 0;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      height: 32px;
      border-radius: 10px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #333;
      background: #fff;
      border: 1px solid transparent;
      position: relative;
    }

    .day-cell.outside {
      opacity: 0.25;
      cursor: default;
    }

    .day-cell.today {
      border-color: var(--violet-main);
      font-weight: 700;
    }

    .day-cell.has-events::after {
      content: "";
      position: absolute;
      bottom: 4px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--violet-main);
    }

    .day-cell.selected {
      background: var(--violet-main);
      color: #fff;
      border-color: var(--violet-main);
    }

    /* AGENDA */
    .agenda-header {
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
    }

    .agenda-date {
      font-weight: 700;
      color: var(--violet-dark);
    }

    .agenda-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agenda-item {
      background: #fff;
      border-radius: 12px;
      padding: 8px 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
      text-align: left;
      border-left: 4px solid var(--violet-main);
      font-size: 13px;
    }

    .agenda-line1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .agenda-time {
      font-weight: 700;
      color: #333;
    }

    .agenda-type {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--violet-light);
      color: #5b45c8;
    }

    .agenda-logement {
      font-weight: 600;
      color: #333;
    }

    .agenda-meta {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .agenda-empty {
      font-size: 13px;
      color: #777;
      text-align: center;
      padding: 18px 4px;
    }

    .agenda-cta {
      margin-top: 10px;
      text-align: center;
    }

    .agenda-cta button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, var(--violet-main), var(--violet-dark));
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    }

    .agenda-cta button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* LIEN RETOUR */
    .back-link {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
    }

    .back-link a {
      color: var(--violet-main);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- LOGO + TITRE -->
    <div class="logo-title">
      <div class="logo-icon">✓</div>
      <h1>CleanUp Manager</h1>
    </div>

    <div class="subtitle">Planning des prestations – Conciergerie</div>
    <div class="badge">Vue mensuelle + agenda du jour</div>

    <!-- LAYOUT PLANNING -->
    <div class="planning-layout">
      <!-- CALENDRIER -->
      <div class="calendar-card">
        <div class="card-title">
          <span>Calendrier</span>
        </div>

        <div class="month-header">
          <button class="month-btn" id="prevMonth">&lt;</button>
          <div class="month-label" id="monthLabel">Mois Année</div>
          <button class="month-btn" id="nextMonth">&gt;</button>
        </div>

        <div class="weekdays">
          <div>Lun</div>
          <div>Mar</div>
          <div>Mer</div>
          <div>Jeu</div>
          <div>Ven</div>
          <div>Sam</div>
          <div>Dim</div>
        </div>

        <div class="calendar-grid" id="calendarDays">
          <!-- Jours générés en JS -->
        </div>
      </div>

      <!-- AGENDA DU JOUR -->
      <div class="agenda-card">
        <div class="card-title">
          <span>Agenda du jour</span>
        </div>

        <div class="agenda-header">
          Prestations du <span class="agenda-date" id="agendaDateLabel"></span>
        </div>

        <div class="agenda-list" id="agendaList">
          <!-- Lignes générées en JS -->
        </div>

        <div class="agenda-cta">
          <button type="button">
            + Ajouter une prestation
          </button>
        </div>
      </div>
    </div>

    <div class="back-link">
      <a href="conciergerie.html">← Retour à mon espace conciergerie</a>
    </div>

  </div>

  <script>
    // Mois en français
    const MONTHS = [
      "janvier", "février", "mars", "avril", "mai", "juin",
      "juillet", "août", "septembre", "octobre", "novembre", "décembre"
    ];

    // Quelques prestations d'exemple (tu pourras les remplacer)
    const sampleEvents = {
      // format clé : "YYYY-MM-DD"
      "2025-03-05": [
        {
          time: "09:00",
          type: "Ménage",
          logement: "T2 – Centre Muret",
          meta: "Check-out + kit ménage & salle de bain"
        },
        {
          time: "15:00",
          type: "Check-in",
          logement: "Studio – Gare",
          meta: "Accueil + remise clés + état des lieux express"
        }
      ],
      "2025-03-06": [
        {
          time: "11:00",
          type: "Réassort",
          logement: "T3 – Quartier Verdun",
          meta: "Kit cuisine + papiers WC + savon mains"
        }
      ]
    };

    let currentDate = new Date();     // date système
    let currentMonth = currentDate.getMonth();
    let currentYear = currentDate.getFullYear();
    let selectedDate = new Date(currentYear, currentMonth, currentDate.getDate());

    const monthLabelEl = document.getElementById("monthLabel");
    const calendarDaysEl = document.getElementById("calendarDays");
    const agendaDateLabelEl = document.getElementById("agendaDateLabel");
    const agendaListEl = document.getElementById("agendaList");
    const prevMonthBtn = document.getElementById("prevMonth");
    const nextMonthBtn = document.getElementById("nextMonth");

    function pad2(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    function formatDateKey(date) {
      return date.getFullYear() + "-" + pad2(date.getMonth() + 1) + "-" + pad2(date.getDate());
    }

    function formatDateLabel(date) {
      const d = date.getDate();
      const m = MONTHS[date.getMonth()];
      const y = date.getFullYear();
      return d + " " + m + " " + y;
    }

    function renderCalendar() {
      monthLabelEl.textContent = MONTHS[currentMonth] + " " + currentYear;

      // Premier jour du mois
      const firstDay = new Date(currentYear, currentMonth, 1);
      const firstDayWeek = firstDay.getDay(); // 0 = dimanche, 1 = lundi, ...
      // On veut que la grille commence un lundi
      const startIndex = (firstDayWeek + 6) % 7; // 0 = lundi

      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

      calendarDaysEl.innerHTML = "";

      const totalCells = 42; // 6 lignes * 7 colonnes pour être safe
      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement("div");
        cell.classList.add("day-cell");

        let dayNumber;
        let cellDate;

        if (i < startIndex) {
          // Jours du mois précédent
          dayNumber = daysInPrevMonth - (startIndex - 1) + i;
          cell.classList.add("outside");
          cellDate = new Date(currentYear, currentMonth - 1, dayNumber);
        } else if (i >= startIndex + daysInMonth) {
          // Jours du mois suivant
          dayNumber = i - (startIndex + daysInMonth) + 1;
          cell.classList.add("outside");
          cellDate = new Date(currentYear, currentMonth + 1, dayNumber);
        } else {
          // Jours du mois courant
          dayNumber = i - startIndex + 1;
          cellDate = new Date(currentYear, currentMonth, dayNumber);
        }

        cell.textContent = dayNumber;

        const todayKey = formatDateKey(currentDate);
        const cellKey = formatDateKey(cellDate);
        const selectedKey = formatDateKey(selectedDate);

        if (cellKey === todayKey && cellDate.getMonth() === currentDate.getMonth()) {
          cell.classList.add("today");
        }

        if (sampleEvents[cellKey]) {
          cell.classList.add("has-events");
        }

        if (cellKey === selectedKey) {
          cell.classList.add("selected");
        }

        // Cliquable seulement pour les jours du mois courant
        if (!cell.classList.contains("outside")) {
          cell.addEventListener("click", () => {
            selectedDate = cellDate;
            renderCalendar();
            renderAgenda();
          });
        }

        calendarDaysEl.appendChild(cell);
      }
    }

    function renderAgenda() {
      const key = formatDateKey(selectedDate);
      agendaDateLabelEl.textContent = formatDateLabel(selectedDate);
      agendaListEl.innerHTML = "";

      const events = sampleEvents[key] || [];

      if (!events.length) {
        const empty = document.createElement("div");
        empty.classList.add("agenda-empty");
        empty.textContent = "Aucune prestation planifiée pour cette journée.";
        agendaListEl.appendChild(empty);
        return;
      }

      events.forEach(ev => {
        const item = document.createElement("div");
        item.classList.add("agenda-item");

        const line1 = document.createElement("div");
        line1.classList.add("agenda-line1");

        const time = document.createElement("div");
        time.classList.add("agenda-time");
        time.textContent = ev.time;

        const type = document.createElement("div");
        type.classList.add("agenda-type");
        type.textContent = ev.type;

        line1.appendChild(time);
        line1.appendChild(type);

        const logement = document.createElement("div");
        logement.classList.add("agenda-logement");
        logement.textContent = ev.logement;

        const meta = document.createElement("div");
        meta.classList.add("agenda-meta");
        meta.textContent = ev.meta;

        item.appendChild(line1);
        item.appendChild(logement);
        item.appendChild(meta);

        agendaListEl.appendChild(item);
      });
    }

    prevMonthBtn.addEventListener("click", () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      // on décale aussi selectedDate au 1er du mois
      selectedDate = new Date(currentYear, currentMonth, 1);
      renderCalendar();
      renderAgenda();
    });

    nextMonthBtn.addEventListener("click", () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      selectedDate = new Date(currentYear, currentMonth, 1);
      renderCalendar();
      renderAgenda();
    });

    // Initialisation
    renderCalendar();
    renderAgenda();
  </script>
</body>
</html>
